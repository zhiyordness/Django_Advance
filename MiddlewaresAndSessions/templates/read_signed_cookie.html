<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Signed Cookie</title>
</head>
<body>
    <h1>Signed Cookie</h1>

    <p>Signature valid: <strong>{{ signature_valid }}</strong></p>
    <p>Verified value: <strong>{{ verified_value }}</strong></p>

    <form action="{% url 'set-signed-cookie' %}" method="get">
        <button type="submit">Set Signed Cookie</button>
    </form>

    <p><a href="{% url 'home' %}">Back to home page</a></p>
</body>
</html>
